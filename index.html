<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BelowMedian — Australian Property Finder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Inconsolata:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #06080a;
  --surface: #0c1014;
  --surf2:   #111820;
  --border:  #1e2d3d;
  --accent:  #00c2ff;
  --accent2: #00ffc8;
  --warn:    #ff4d6d;
  --text:    #d8eaf5;
  --muted:   #4a6880;
  --card:    #090e13;
  --glow:    rgba(0,194,255,0.15);
}
html, body { height: 100%; }
body { font-family: 'Inconsolata', monospace; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* HEADER */
header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 52px; display: flex; align-items: center; gap: 14px; position: relative; z-index: 100; flex-wrap: wrap; }
header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent); opacity: .4; }

.logo { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: .9rem; letter-spacing: -.03em; white-space: nowrap; display: flex; align-items: center; }
.logo-b { color: var(--accent); }
.logo-dot { width: 5px; height: 5px; background: var(--accent2); border-radius: 50%; margin: 0 6px; }
.logo-au { font-size: .5rem; color: var(--muted); border: 1px solid var(--border); padding: 2px 4px; border-radius: 3px; margin-left: 5px; font-family: 'Inconsolata', monospace; font-weight: 400; }

.ctrl { display: flex; align-items: center; gap: 7px; }
.lbl { font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }

input[type=range] { -webkit-appearance: none; appearance: none; width: 110px; height: 3px; background: var(--border); border-radius: 2px; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); cursor: pointer; }

.tv { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: .85rem; color: var(--accent); min-width: 36px; }
.tog { display: flex; gap: 3px; }
.tbtn { font-family: 'Inconsolata', monospace; font-size: .6rem; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
.tbtn.on { border-color: var(--accent); color: var(--accent); background: rgba(0,194,255,.08); }

.proxy-wrap { display: flex; align-items: center; gap: 6px; background: var(--surf2); border: 1px solid var(--border); border-radius: 5px; padding: 0 8px; height: 30px; }
.proxy-wrap span { font-size: .58rem; color: var(--muted); white-space: nowrap; }
.proxy-wrap input { background: transparent; border: none; outline: none; color: var(--text); font-family: 'Inconsolata', monospace; font-size: .7rem; width: 180px; }
.proxy-wrap input::placeholder { color: var(--muted); }

.search-btn { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: .58rem; letter-spacing: .07em; text-transform: uppercase; padding: 7px 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 5px; cursor: pointer; white-space: nowrap; transition: all .2s; flex-shrink: 0; }
.search-btn:hover { background: var(--accent2); }
.search-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.sw { display: flex; align-items: center; gap: 6px; font-size: .6rem; color: var(--muted); white-space: nowrap; margin-left: auto; }
.sd { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.sd.loading { background: #f0c040; animation: pulse .7s infinite; }
.sd.ok      { background: var(--accent2); }
.sd.err     { background: var(--warn); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.15} }

/* LAYOUT */
#mc { flex: 1; display: flex; overflow: hidden; }
#map { flex: 1; background: #080e14; }
.leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 6px !important; overflow: hidden; }
.leaflet-control-zoom a { background: var(--surface) !important; color: var(--accent) !important; border-color: var(--border) !important; }
.leaflet-control-attribution { display: none !important; }
.leaflet-popup-content-wrapper { background: rgba(9,14,19,.98) !important; border: 1px solid var(--accent) !important; border-radius: 8px !important; color: var(--text) !important; font-family: 'Inconsolata', monospace !important; box-shadow: 0 8px 40px rgba(0,0,0,.7) !important; min-width: 220px; }
.leaflet-popup-tip { background: var(--accent) !important; }
.leaflet-popup-close-button { color: var(--muted) !important; }
.leaflet-popup-content { margin: 12px 14px !important; font-size: 13px !important; }

/* SIDEBAR */
#sb { width: 310px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sb-hd { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: var(--surf2); }
.sb-ti { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: .65rem; letter-spacing: .04em; }
.sb-meta { display: flex; align-items: center; gap: 6px; }
.sb-ct { font-size: .58rem; color: var(--muted); background: var(--card); border: 1px solid var(--border); padding: 2px 7px; border-radius: 10px; }
.sb-sort { font-family: 'Inconsolata', monospace; font-size: .58rem; color: var(--text); background: var(--card); border: 1px solid var(--border); padding: 3px 6px; border-radius: 4px; cursor: pointer; outline: none; -webkit-appearance: none; }
.sb-sort option { background: var(--surf2); }
.sb-bd { overflow-y: auto; flex: 1; padding: 8px; }
.sb-bd::-webkit-scrollbar { width: 3px; }
.sb-bd::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* CARD */
.pc { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 10px 11px; margin-bottom: 6px; cursor: pointer; transition: border-color .15s; position: relative; }
.pc::after { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 2px; background: linear-gradient(var(--accent), var(--accent2)); opacity: 0; transition: opacity .15s; border-radius: 7px 0 0 7px; }
.pc:hover { border-color: rgba(0,194,255,.4); }
.pc:hover::after, .pc.active::after { opacity: 1; }
.pc.active { border-color: var(--accent); background: rgba(0,194,255,.04); }

.pc-r1 { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 2px; }
.pc-addr { font-family: 'Unbounded', sans-serif; font-weight: 600; font-size: .65rem; line-height: 1.4; color: var(--text); flex: 1; }
.pc-pct { font-size: .58rem; font-weight: 600; padding: 2px 5px; border-radius: 3px; background: rgba(0,255,200,.1); border: 1px solid rgba(0,255,200,.25); color: var(--accent2); white-space: nowrap; flex-shrink: 0; }
.pc-sub { font-size: .58rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
.pc-prices { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 6px; }
.pc-price { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: .95rem; color: var(--accent); }
.pc-mv { text-align: right; }
.pc-ml { font-size: .54rem; color: var(--muted); display: block; }
.pc-mn { font-size: .72rem; color: var(--muted); }
.pc-sav { font-size: .58rem; color: var(--accent2); margin-bottom: 6px; }
.pc-meta { font-size: .58rem; color: var(--muted); margin-bottom: 6px; }
.pc-desc { font-size: .58rem; color: var(--muted); margin-bottom: 6px; line-height: 1.6; }
.pc-ag { font-size: .56rem; color: var(--muted); margin-bottom: 6px; }
.pc-ft { display: flex; gap: 5px; }
.pc-lnk { flex: 1; display: block; text-align: center; font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: .54rem; letter-spacing: .05em; text-transform: uppercase; color: var(--bg); background: var(--accent); padding: 6px; border-radius: 4px; text-decoration: none; transition: background .15s; }
.pc-lnk:hover { background: var(--accent2); }
.pc-src { font-size: .54rem; padding: 3px 7px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); background: var(--surf2); display: flex; align-items: center; }

.empty { padding: 30px 16px; text-align: center; color: var(--muted); font-size: .68rem; line-height: 2; }
.skel { background: var(--surf2); border-radius: 3px; height: 10px; margin-bottom: 6px; animation: sk 1.2s infinite; }
@keyframes sk { 0%,100%{opacity:1} 50%{opacity:.35} }
.sk-c { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 10px 11px; margin-bottom: 6px; }

/* POPUP */
.pu-addr { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: .76rem; margin-bottom: 2px; line-height: 1.3; }
.pu-sub  { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
.pu-price { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 1.05rem; color: var(--accent); margin-bottom: 2px; }
.pu-below { font-size: .6rem; color: var(--accent2); margin-bottom: 4px; }
.pu-med   { font-size: .6rem; color: var(--muted); margin-bottom: 6px; }
.pu-meta  { font-size: .6rem; color: var(--muted); margin-bottom: 9px; }
.pu-lnk { display: block; text-align: center; font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: .58rem; letter-spacing: .06em; text-transform: uppercase; color: var(--bg); background: var(--accent); padding: 7px; border-radius: 5px; text-decoration: none; }
.pu-lnk:hover { background: var(--accent2); }

.pin { width: 22px; height: 22px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid var(--bg); box-shadow: 0 2px 6px rgba(0,0,0,.4); cursor: pointer; transition: transform .15s; }
.pin.hi { transform: rotate(-45deg) scale(1.35); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-b">Below</span><span style="color:var(--text)">Median</span>
    <div class="logo-dot"></div>
    <span class="logo-au">AU</span>
  </div>

  <div class="ctrl">
    <span class="lbl">Below median</span>
    <input type="range" id="thresh" min="5" max="50" step="5" value="10">
    <span class="tv" id="tv">10%</span>
  </div>

  <div class="ctrl">
    <span class="lbl">Source</span>
    <div class="tog">
      <button class="tbtn on" data-src="domain" onclick="togBtn(this, activeSrc)">Domain</button>
      <button class="tbtn on" data-src="rea"    onclick="togBtn(this, activeSrc)">REA</button>
    </div>
  </div>

  <div class="ctrl">
    <span class="lbl">Type</span>
    <div class="tog">
      <button class="tbtn on" data-type="house"     onclick="togBtn(this, activeType)">House</button>
      <button class="tbtn on" data-type="unit"      onclick="togBtn(this, activeType)">Unit</button>
      <button class="tbtn"    data-type="townhouse" onclick="togBtn(this, activeType)">Town</button>
    </div>
  </div>

  <!-- Proxy URL — change this to your deployed proxy URL -->
  <div class="proxy-wrap">
    <span>Proxy</span>
    <input type="text" id="proxyUrl" value="https://belowmedian-proxy-production.up.railway.app/" placeholder="https://your-proxy.railway.app">
  </div>

  <button class="search-btn" id="searchBtn" onclick="doSearch()">⌕ Search Area</button>

  <div class="sw">
    <div class="sd" id="sd"></div>
    <span id="st">Pan map then search</span>
  </div>
</header>

<div id="mc">
  <div id="map"></div>

  <div id="sb">
    <div class="sb-hd">
      <span class="sb-ti">Results</span>
      <div class="sb-meta">
        <select class="sb-sort" id="sortSel" onchange="applySort()">
          <option value="pct">Most below median</option>
          <option value="price-lo">Price: low first</option>
          <option value="price-hi">Price: high first</option>
          <option value="saving">Biggest saving</option>
        </select>
        <span class="sb-ct" id="sbc">—</span>
      </div>
    </div>
    <div class="sb-bd" id="sbd">
      <div class="empty">
        Pan the map to your area of interest,<br>
        then click <strong style="color:var(--accent)">Search Area</strong>.<br><br>
        <span style="font-size:.6rem;opacity:.7;">
          Make sure your proxy server is running<br>
          and the URL above is correct.
        </span>
      </div>
    </div>
  </div>
</div>

<script>
// ── MAP ────────────────────────────────────────────────────────
const map = L.map('map', { center: [-33.87, 151.21], zoom: 13 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, subdomains: 'abcd'
}).addTo(map);

// ── STATE ──────────────────────────────────────────────────────
let activeSrc  = new Set(['domain','rea']);
let activeType = new Set(['house','unit']);
let markers = [], activeIdx = null, allProps = [], sortedProps = [], busy = false;

// ── CONTROLS ───────────────────────────────────────────────────
document.getElementById('thresh').addEventListener('input', function() {
  document.getElementById('tv').textContent = this.value + '%';
});

function togBtn(btn, set) {
  const k = btn.dataset.src || btn.dataset.type;
  set.has(k) ? set.delete(k) : set.add(k);
  btn.classList.toggle('on', set.has(k));
}

function setSt(cls, txt) {
  document.getElementById('sd').className = 'sd ' + cls;
  document.getElementById('st').textContent = txt;
}

function showSkel() {
  document.getElementById('sbd').innerHTML = [1,2,3,4].map(() => `
    <div class="sk-c">
      <div class="skel" style="width:68%"></div>
      <div class="skel" style="width:38%;height:7px"></div>
      <div class="skel" style="width:50%;height:17px;margin-top:8px"></div>
      <div class="skel" style="width:80%;height:7px"></div>
      <div class="skel" style="width:95%;height:24px;border-radius:4px;margin-top:6px"></div>
    </div>`).join('');
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m.mk));
  markers = []; activeIdx = null;
}

// ── SEARCH ─────────────────────────────────────────────────────
async function doSearch() {
  if (busy) return;
  busy = true;
  document.getElementById('searchBtn').disabled = true;
  setSt('loading', 'Searching…');
  showSkel();
  clearMarkers();
  document.getElementById('sbc').textContent = '—';

  const proxyUrl = document.getElementById('proxyUrl').value.trim().replace(/\/$/, '');
  const bounds   = map.getBounds();
  const threshold = parseInt(document.getElementById('thresh').value);

  try {
    const resp = await fetch(proxyUrl + '/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bounds: {
          sw: { lat: bounds.getSouth(), lng: bounds.getWest() },
          ne: { lat: bounds.getNorth(), lng: bounds.getEast() }
        },
        threshold,
        sources: [...activeSrc],
        types:   [...activeType]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      throw new Error(err.error || 'HTTP ' + resp.status);
    }

    const data = await resp.json();
    allProps = data.properties || [];
    applySort();
    setSt('ok', allProps.length + ' found');
    document.getElementById('sbc').textContent = allProps.length + ' result' + (allProps.length === 1 ? '' : 's');

    if (!allProps.length) {
      document.getElementById('sbd').innerHTML = `
        <div class="empty">
          No listings found ${threshold}%+ below the suburb median here.<br><br>
          <span style="font-size:.6rem;opacity:.7;">Try a lower threshold, different types,<br>or pan to another area.</span>
        </div>`;
    }
  } catch(err) {
    console.error(err);
    setSt('err', 'Error');
    document.getElementById('sbd').innerHTML = `
      <div class="empty" style="color:var(--warn);">
        ⚠ ${esc(err.message)}<br><br>
        <span style="font-size:.6rem;color:var(--muted);">
          Is the proxy running at ${esc(proxyUrl)}?<br>
          Check the console for details.
        </span>
      </div>`;
  }

  document.getElementById('searchBtn').disabled = false;
  busy = false;
}

// ── SORT ───────────────────────────────────────────────────────
function applySort() {
  const mode = document.getElementById('sortSel').value;
  sortedProps = [...allProps];
  if (mode === 'pct')      sortedProps.sort((a,b) => b.percentBelow - a.percentBelow);
  if (mode === 'price-lo') sortedProps.sort((a,b) => a.price - b.price);
  if (mode === 'price-hi') sortedProps.sort((a,b) => b.price - a.price);
  if (mode === 'saving')   sortedProps.sort((a,b) => b.dollarsBelow - a.dollarsBelow);
  renderCards(sortedProps);
}

// ── RENDER ─────────────────────────────────────────────────────
function renderCards(props) {
  clearMarkers();
  activeIdx = null;
  const body = document.getElementById('sbd');
  if (!props.length) return;
  body.innerHTML = '';

  props.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'pc'; card.id = 'card-' + i;

    const saving = p.dollarsBelow
      ? 'Save ' + fmtP(p.dollarsBelow)
      : (+p.percentBelow).toFixed(1) + '% below median';

    const meta = [
      p.beds  != null ? p.beds  + ' bed'  : '',
      p.baths != null ? p.baths + ' bath' : '',
      p.cars  > 0     ? p.cars  + ' car'  : '',
      p.landSize       ? p.landSize + 'm²' : '',
      p.propType || ''
    ].filter(Boolean).join(' · ');

    card.innerHTML = `
      <div class="pc-r1">
        <div class="pc-addr">${esc(p.address)}</div>
        <div class="pc-pct">▼${(+p.percentBelow).toFixed(1)}%</div>
      </div>
      <div class="pc-sub">${esc(p.suburb)}${p.postcode ? ' ' + esc(p.postcode) : ''}, ${esc(p.state)}</div>
      <div class="pc-prices">
        <div class="pc-price">${fmtP(p.price)}</div>
        <div class="pc-mv">
          <span class="pc-ml">suburb median</span>
          <span class="pc-mn">${fmtP(p.medianPrice)}</span>
        </div>
      </div>
      <div class="pc-sav">${esc(saving)} below the ${esc(p.suburb)} median</div>
      ${meta ? `<div class="pc-meta">${esc(meta)}</div>` : ''}
      ${p.description ? `<div class="pc-desc">${esc(p.description)}</div>` : ''}
      ${p.agencyName  ? `<div class="pc-ag">📍 ${esc(p.agencyName)}</div>` : ''}
      <div class="pc-ft">
        <a class="pc-lnk" href="${esc(p.url)}" target="_blank" rel="noopener">View on ${esc(p.source)} ↗</a>
        <div class="pc-src">${esc(p.source)}</div>
      </div>`;

    card.addEventListener('click', () => focusProp(i));
    body.appendChild(card);

    if (p.lat && p.lng) {
      const col  = p.source === 'Domain' ? '#00c2ff' : '#00ffc8';
      const icon = L.divIcon({
        className: '',
        html: `<div class="pin" id="pin-${i}" style="background:${col};"></div>`,
        iconSize: [22,22], iconAnchor: [6,22], popupAnchor: [5,-22]
      });
      const mk = L.marker([p.lat, p.lng], { icon }).addTo(map);
      const metaStr = [
        p.beds  != null ? p.beds  + ' bed'  : '',
        p.baths != null ? p.baths + ' bath' : '',
        p.cars  > 0     ? p.cars  + ' car'  : '',
        p.propType || ''
      ].filter(Boolean).join(' · ');

      mk.bindPopup(L.popup({ maxWidth: 240 }).setContent(`
        <div class="pu-addr">${esc(p.address)}</div>
        <div class="pu-sub">${esc(p.suburb)}, ${esc(p.state)}</div>
        <div class="pu-price">${fmtP(p.price)}</div>
        <div class="pu-below">▼ ${(+p.percentBelow).toFixed(1)}% below suburb median</div>
        <div class="pu-med">Suburb median: ${fmtP(p.medianPrice)}</div>
        ${metaStr ? `<div class="pu-meta">${esc(metaStr)}</div>` : ''}
        <a class="pu-lnk" href="${esc(p.url)}" target="_blank" rel="noopener">View on ${esc(p.source)} ↗</a>`));

      mk.on('click', () => focusProp(i));
      markers.push({ mk, idx: i });
    }
  });
}

// ── FOCUS ──────────────────────────────────────────────────────
function focusProp(i) {
  if (activeIdx !== null) {
    document.getElementById('card-' + activeIdx)?.classList.remove('active');
    document.getElementById('pin-'  + activeIdx)?.classList.remove('hi');
  }
  activeIdx = i;
  const card = document.getElementById('card-' + i);
  const pin  = document.getElementById('pin-'  + i);
  card?.classList.add('active');
  card?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  pin?.classList.add('hi');

  const p = sortedProps[i];
  if (p?.lat && p?.lng) {
    map.setView([p.lat, p.lng], Math.max(map.getZoom(), 15), { animate: true });
    markers.find(m => m.idx === i)?.mk.openPopup();
  }
}

// ── UTILS ──────────────────────────────────────────────────────
function fmtP(n) {
  if (n == null) return 'N/A';
  const v = Number(n);
  if (isNaN(v)) return 'N/A';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
  if (v >= 1e3) return '$' + Math.round(v/1000) + 'K';
  return '$' + v.toLocaleString('en-AU');
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
